server.port=8080

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL_ADDRESS@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

prostaff.mail.admin-email=info@prostaffsolution.com
prostaff.mail.from-email=YOUR_GMAIL_ADDRESS@gmail.com
prostaff.mail.from-name=Prostaff Solution

prostaff.cors.allowed-origins=http://localhost:5173


logging.level.com.prostaff=INFO
